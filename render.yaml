services:
  - type: web
    name: odds-ai-v18
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MIN_START_MINUTES
        value: "10"
      - key: MAX_START_MINUTES
        value: "720"
