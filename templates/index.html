
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Odds AI Pro V18</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <div>
        <p class="eyebrow">Odds AI Pro V18</p>
        <h1>종목 분리 필터 강화판</h1>
        <p>야구 탭에 축구 1X2/X 배당이 섞이면 자동 제외합니다.</p>
      </div>
      <div class="controls">
        <select id="sport">
          <option value="all">전체</option>
          <option value="baseball">야구</option>
          <option value="football">축구</option>
          <option value="basketball">농구</option>
          <option value="volleyball">배구</option>
          <option value="ice-hockey">하키</option>
          <option value="american-football">미식축구</option>
        </select>
        <select id="minutes">
          <option value="120">2시간</option>
          <option value="360">6시간</option>
          <option value="720" selected>12시간</option>
        </select>
        <button id="gamesBtn">경기 확인</button>
        <button id="analyzeBtn" class="primary">AI 분석</button>
      </div>
    </header>

    <section id="status"></section>
    <section id="results"></section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
